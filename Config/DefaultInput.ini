; -----------------------------------------------------------------------
; Input configuration for Meta Quest controllers (Touch Pro / Touch Plus)
; and hand tracking.
;
; UE5 Enhanced Input is used for all action/axis bindings.
; Legacy mappings below are kept as fallback reference.
;
; Controller layout reference:
;   Left:  Thumbstick, X/Y buttons, Grip, Trigger, Menu
;   Right: Thumbstick, A/B buttons, Grip, Trigger, Oculus
; -----------------------------------------------------------------------

[/Script/Engine.InputSettings]
DefaultPlayerInputClass=/Script/EnhancedInput.EnhancedPlayerInput
DefaultInputComponentClass=/Script/EnhancedInput.EnhancedInputComponent
bUseMouseForTouch=False
bEnableMotionControls=True

[/Script/EnhancedInput.EnhancedInputDeveloperSettings]
bEnableWorldSubsystem=True

; VR-specific Input Actions and Mapping Contexts are defined in:
;   Source/Project1984/VR/   — IMC_Quest.uasset, IA_Interact.uasset, etc.
; Controller: Thumbstick locomotion, grip for grab, trigger for interact
; Hand tracking: Pinch for select, grab gesture for pickup

; -----------------------------------------------------------------------
; Legacy Action Mappings (reference / non-Enhanced Input fallback)
; -----------------------------------------------------------------------
+ActionMappings=(ActionName="Interact_Right",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=OculusTouch_Right_Trigger_Click)
+ActionMappings=(ActionName="Interact_Left",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=OculusTouch_Left_Trigger_Click)
+ActionMappings=(ActionName="Grab_Right",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=OculusTouch_Right_Grip_Click)
+ActionMappings=(ActionName="Grab_Left",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=OculusTouch_Left_Grip_Click)
+ActionMappings=(ActionName="Teleport_Activate",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=OculusTouch_Right_Thumbstick_Click)
+ActionMappings=(ActionName="OpenDiary",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=OculusTouch_Left_Y_Click)
+ActionMappings=(ActionName="PauseMenu",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=OculusTouch_Left_Menu_Click)
+ActionMappings=(ActionName="SnapTurnLeft",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=OculusTouch_Right_Thumbstick_Left)
+ActionMappings=(ActionName="SnapTurnRight",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=OculusTouch_Right_Thumbstick_Right)
+ActionMappings=(ActionName="Examine",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=OculusTouch_Right_B_Click)

; -----------------------------------------------------------------------
; Legacy Axis Mappings (reference / non-Enhanced Input fallback)
; -----------------------------------------------------------------------
+AxisMappings=(AxisName="MoveForward",Scale=1.0,Key=OculusTouch_Left_Thumbstick_Y)
+AxisMappings=(AxisName="MoveRight",Scale=1.0,Key=OculusTouch_Left_Thumbstick_X)
+AxisMappings=(AxisName="TeleportAim",Scale=1.0,Key=OculusTouch_Right_Thumbstick_Y)
+AxisMappings=(AxisName="RightTriggerAxis",Scale=1.0,Key=OculusTouch_Right_Trigger_Axis)
+AxisMappings=(AxisName="LeftTriggerAxis",Scale=1.0,Key=OculusTouch_Left_Trigger_Axis)
+AxisMappings=(AxisName="RightGripAxis",Scale=1.0,Key=OculusTouch_Right_Grip_Axis)
+AxisMappings=(AxisName="LeftGripAxis",Scale=1.0,Key=OculusTouch_Left_Grip_Axis)
