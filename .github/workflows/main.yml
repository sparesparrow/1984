name: UE5 Build Validation

# Fast PR validation: structure checks, shellcheck, INI linting, LFS rules.
# Full Android packaging is handled by package-quest.yml (self-hosted runner required).

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  validate-structure:
    name: Validate Project Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate .uproject file (when present)
        run: |
          if [[ -f "1984.uproject" ]]; then
            python3 -c "import json; json.load(open('1984.uproject'))"
            echo "OK: 1984.uproject is valid JSON"
          else
            echo "SKIP: 1984.uproject not yet committed (pre-UE5 init)"
          fi

      - name: Check required config files exist
        run: |
          REQUIRED=(
            "Config/DefaultEngine.ini"
            "Config/DefaultGame.ini"
            "Config/DefaultInput.ini"
          )
          for f in "${REQUIRED[@]}"; do
            [[ -f "$f" ]] && echo "OK: $f" || { echo "MISSING: $f"; exit 1; }
          done

      - name: Validate source structure (when Source/ exists)
        run: |
          if [[ ! -d "Source" ]]; then
            echo "SKIP: Source/ not yet committed"
            exit 0
          fi
          REQUIRED=(
            "Source/Project1984/Project1984.Build.cs"
            "Source/Project1984.Target.cs"
            "Source/Project1984Editor.Target.cs"
            "Source/Project1984/Core/GameMode/Project1984GameMode.h"
            "Source/Project1984/Core/Systems/SurveillanceSystem.h"
            "Source/Project1984/VR/VRPawnBase.h"
          )
          for f in "${REQUIRED[@]}"; do
            [[ -f "$f" ]] && echo "OK: $f" || { echo "MISSING: $f"; exit 1; }
          done

      - name: Validate C++ headers have GENERATED_BODY() (when Source/ exists)
        run: |
          if [[ ! -d "Source" ]]; then exit 0; fi
          errors=0
          while IFS= read -r -d '' f; do
            grep -q "GENERATED_BODY()" "$f" || { echo "MISSING GENERATED_BODY(): $f"; errors=$((errors+1)); }
          done < <(find Source -name "*.h" -print0)
          [[ "$errors" -eq 0 ]] && echo "OK: all headers have GENERATED_BODY()"
          [[ "$errors" -gt 0 ]] && exit 1 || true

      - name: Validate INI configs (no tab characters — UE5 requirement)
        run: |
          if grep -rP '\t' Config/; then
            echo "ERROR: Tab characters in Config/ — UE5 INI files must use spaces."
            exit 1
          fi
          echo "OK: INI files have no tabs."

      - name: Lint shell scripts
        run: |
          sudo apt-get install -y shellcheck -qq
          find scripts/ -name "*.sh" -exec shellcheck --severity=warning {} +

      - name: Check .gitignore covers UE5 artifacts
        run: |
          for pattern in "Binaries/" "Intermediate/" "Saved/" "DerivedDataCache/" "*.apk"; do
            grep -qF "$pattern" .gitignore \
              && echo "OK: $pattern" \
              || { echo "MISSING from .gitignore: $pattern"; exit 1; }
          done

      - name: Check Git LFS tracking (when .gitattributes exists)
        run: |
          if [[ ! -f ".gitattributes" ]]; then
            echo "SKIP: .gitattributes not yet committed"
            exit 0
          fi
          for ext in uasset umap fbx; do
            grep -q "*.$ext" .gitattributes \
              && echo "OK: LFS tracking *.$ext" \
              || { echo "MISSING LFS rule for *.$ext in .gitattributes"; exit 1; }
          done

