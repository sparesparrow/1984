name: UE5 Build Validation

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]

jobs:
  validate-structure:
    name: Validate Project Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate .uproject file
        run: |
          echo "Checking 1984.uproject exists and is valid JSON..."
          python3 -c "import json; json.load(open('1984.uproject'))"
          echo "✓ .uproject is valid JSON"

      - name: Validate source structure
        run: |
          echo "Checking required source files..."
          required_files=(
            "Source/Project1984/Project1984.Build.cs"
            "Source/Project1984.Target.cs"
            "Source/Project1984Editor.Target.cs"
            "Source/Project1984/Core/GameMode/Project1984GameMode.h"
            "Source/Project1984/Core/Systems/SurveillanceSystem.h"
            "Source/Project1984/VR/VRPawnBase.h"
            "Config/DefaultEngine.ini"
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "✗ Missing: $f"
              exit 1
            fi
            echo "✓ Found: $f"
          done

      - name: Validate C++ headers
        run: |
          echo "Checking all .h files have GENERATED_BODY()..."
          errors=0
          for f in $(find Source -name "*.h" -type f); do
            if ! grep -q "GENERATED_BODY()" "$f"; then
              echo "✗ Missing GENERATED_BODY() in: $f"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors files missing GENERATED_BODY()"
            exit 1
          fi
          echo "✓ All headers have GENERATED_BODY()"

      - name: Check Git LFS tracking
        run: |
          echo "Verifying .gitattributes LFS rules..."
          for ext in uasset umap png jpg wav mp3 ogg fbx obj blend; do
            if ! grep -q "*.$ext" .gitattributes; then
              echo "✗ Missing LFS tracking for *.$ext"
              exit 1
            fi
            echo "✓ LFS tracking: *.$ext"
          done

